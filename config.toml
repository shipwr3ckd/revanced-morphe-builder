enable-module-update = false
dpi = "nodpi 120-640dpi"
patches-version = "dev"
cli-version = "dev"

# ReVanced

[Instagram]
enabled = false
app-name = "Instagram"
patches-source = "revanced/revanced-patches"
cli-source = "revanced/revanced-cli"
# direct-dlurl = "https://github.com/shipwr3ckd/apks/releases/download/Release/com.instagram.android-420.0.0.0.10-20260315-005243.apk"
# apkmirror-dlurl = "https://www.apkmirror.com/apk/instagram/instagram-instagram/"
uptodown-dlurl = "https://instagram.en.uptodown.com/android/"
build-mode = "apk"
version = "417.0.0.54.77"
arch = "arm64-v8a"
included-patches = "'Disable Sentry telemetry' 'Disable analytics' 'Enable developer menu' 'Hide ads' 'Open links externally' 'Prevent screenshot detection' 'Remove build expired popup' 'Remove screen capture restriction' 'Remove screenshot restriction' 'Sanitize sharing links'"
patcher-args = "-e 'Change package name' -OpackageName=com.revanced.instagram.android -e 'Change version code' -OversionCode=2147483647 -e 'Change link sharing domain' -OdomainName=kkinstagram.com"

